<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">

  <title>Datos del alumno</title>

  <link rel="stylesheet" href="styles.css">

  <!-- AOS -->
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

  <div id="marquesina">
    ★ ¡Hola! Bienvenido a mi primera página web ★
  </div>

  <div data-aos="fade-up" data-aos-duration="900">

    <h1 id="titulo"></h1>

    <p id="docente"></p>

    <p id="alumno"></p>

    <p id="materia"></p>

    <p id="campus"></p>

  </div>

  <!-- GALERÍA INTERACTIVA -->
  <h2 class="titulo-galeria" data-aos="fade-up">
    📸 Galería interactiva
  </h2>

  <div class="galeria"
       data-aos="fade-up"
       data-aos-delay="250"
       data-aos-duration="900">

    <img src="img/image1.jpeg" alt="Imagen 1">

    <img src="img/image2.jpeg" alt="Imagen 2">

    <img src="img/image3.jpeg" alt="Imagen 3">

    <img src="img/image4.jpeg" alt="Imagen 4">

    <img src="img/image5.jpeg" alt="Imagen 5">

    <img src="img/image6.jpeg" alt="Imagen 6">

  </div>

  <!-- GRÁFICA -->
  <div data-aos="fade-left"
       data-aos-delay="300"
       data-aos-duration="900">

    <h2 class="titulo-grafica">
      🎵 Artistas que más escucho
    </h2>

    <canvas id="graficaArtistas"></canvas>

  </div>

  <!-- MODAL -->
  <div id="modal" class="modal">

    <span id="cerrar">&times;</span>

    <img id="imagenGrande" class="modal-img">

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

  <script>
    AOS.init();
  </script>

  <script src="galeria.js"></script>

</body>
</html>
